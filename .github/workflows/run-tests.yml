name: Run tests

on: [push, pull_request]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        build_type: [Debug, Release]

    runs-on: ${{ matrix.os }}
    name: Run Tests (${{ matrix.os }}, ${{ matrix.build_type }})

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup LLVM 22
        uses: ZhongRuoyu/setup-llvm@v0
        with:
          llvm-version: 22

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y python3-tomli

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          pip3 install tomli --break-system-packages

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain 1.94.0
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Configure
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.build_type }} \
                -DLIT_FLAGS="-v" \
                -GNinja ..

      - name: Build
        run: ninja
        working-directory: build

      - name: Run unit tests
        run: ninja check
        working-directory: build

      - name: Check rules
        run: ninja check-rules
        working-directory: build

      - name: Check benchmarks (don't run)
        run: ninja check-benchmarks
        working-directory: build
        env:
          SKIP_RUN: 1
