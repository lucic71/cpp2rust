name: Format Apply

on:
  workflow_run:
    workflows: ["Format Check"]
    types: [completed]

jobs:
  suggest:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download diff artifact
        uses: actions/download-artifact@v4
        with:
          name: format-diff
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ runner.temp }}/format-diff

      - name: Read PR metadata
        id: meta
        run: |
          echo "number=$(cat ${{ runner.temp }}/format-diff/pr-number.txt)" >> "$GITHUB_OUTPUT"
          echo "sha=$(cat ${{ runner.temp }}/format-diff/head-sha.txt)" >> "$GITHUB_OUTPUT"

      - name: Checkout base repo at PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.sha }}

      - name: Replay diff in working tree
        run: git apply ${{ runner.temp }}/format-diff/format.diff

      - name: Fabricate a pull_request event for reviewdog
        run: |
          cat > ${{ runner.temp }}/pr-event.json <<EOF
          {
            "number": ${{ steps.meta.outputs.number }},
            "pull_request": {
              "number": ${{ steps.meta.outputs.number }},
              "head": { "sha": "${{ steps.meta.outputs.sha }}" }
            }
          }
          EOF
          echo "GITHUB_EVENT_NAME=pull_request" >> $GITHUB_ENV
          echo "GITHUB_EVENT_PATH=${{ runner.temp }}/pr-event.json" >> $GITHUB_ENV

      - name: Post suggestions
        uses: reviewdog/action-suggester@v1
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tool_name: format
          filter_mode: nofilter
