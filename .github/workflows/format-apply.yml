name: Format Apply

on:
  workflow_run:
    workflows: ["Format Check"]
    types: [completed]

jobs:
  suggest:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download diff artifact
        uses: actions/download-artifact@v4
        with:
          name: format-diff
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ runner.temp }}/format-diff

      - name: Read PR metadata
        id: meta
        run: |
          echo "number=$(cat ${{ runner.temp }}/format-diff/pr-number.txt)" >> "$GITHUB_OUTPUT"
          echo "sha=$(cat ${{ runner.temp }}/format-diff/head-sha.txt)" >> "$GITHUB_OUTPUT"

      - name: Checkout base repo at PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.sha }}

      - name: Replay diff in working tree
        run: git apply ${{ runner.temp }}/format-diff/format.diff

      - name: Post suggestions
        uses: reviewdog/action-suggester@v1
        env:
          CI_PULL_REQUEST: ${{ steps.meta.outputs.number }}
          CI_COMMIT: ${{ steps.meta.outputs.sha }}
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tool_name: format
          filter_mode: nofilter
