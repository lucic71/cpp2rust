name: Format Apply

on:
  workflow_run:
    workflows: ["Format Check"]
    types: [completed]

jobs:
  suggest:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.event == 'pull_request'
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Download diff artifact
        uses: actions/download-artifact@v4
        with:
          name: format-diff
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: ${{ runner.temp }}/format-diff

      - name: Extract head SHA from event
        id: meta
        run: |
          sha=$(jq -r '.pull_request.head.sha' ${{ runner.temp }}/format-diff/pr-event.json)
          echo "sha=$sha" >> "$GITHUB_OUTPUT"

      - name: Checkout base repo at PR head
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.sha }}

      - name: Replay diff in working tree
        run: git apply ${{ runner.temp }}/format-diff/format.diff

      - name: Overwrite the runner's event file with the PR event
        run: cp ${{ runner.temp }}/format-diff/pr-event.json "$GITHUB_EVENT_PATH"

      - name: Post suggestions
        uses: reviewdog/action-suggester@v1
        env:
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tool_name: format
          filter_mode: nofilter
